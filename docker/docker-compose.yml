version: "3.9"

services:
  b3-data-pipeline:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: b3-data-pipeline

    ports:
      - "8890:8888"

    volumes:
      - ../:/app

    working_dir: /app

    command: >
      sh -c "jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --ServerApp.token=''
      --ServerApp.password=''
      --ServerApp.disable_check_xsrf=True"